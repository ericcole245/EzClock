<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
    margin: 0;
    padding : 0;
    box-sizing : border-box ;
    font-family : 'Roboto' , sans-serif ;
}

body {
    display :  flex ;
    background : #0e0e0e ;
    align-items : center ;
    justify-content : center ;
    min-height : 100vh ;
}


.wrapper {
    position : relative ;
    width : 320px ;
  height : 150px ;
  border : 0 ;
  border-radius : 0.6em ;
  background : linear-gradient(130deg , #0695FF , #06FFED , #06FF70);
  display : flex ;
  align-items : center ;
  justify-content : center ;
  animation : bghueRotate 6s linear infinite ;
}

.container {
    display : flex ;
    position : relative ;
    width : 290px ;
    height : 120px ;
    border : 0 ;
    border-radius : inherit ;
    align-items : center ;
    justify-content : center ;
    background : #0e0e0e ;
}

#timeInfo {
    position : relative ;
    width : 100% ;
    height : 100% ;
   /* background : linear-gradient(130deg , #0695FF , #06FFED , #06FF70);
    -webkit-background-clip : text ;
    -webkit-text-fill-color : transparent ;*/
    border-radius : inherit ;
    text-align : center ;
    line-height : 60px  ;
}

#timeInfo > .dateInfo ,
#timeInfo > .time {
    position : relative ;
    margin : -0.2rem ;
    font-size : 40px ;
    background : linear-gradient(130deg , #0695FF , #06FFED , #06FF70);
    -webkit-background-clip : text ;
    -webkit-text-fill-color : transparent ;
    letter-spacing : 0.1em ;
    font-weight : 900 ;
    text-transform : capitalize ;
}

#timeInfo > .time {
    text-transform : uppercase; 
}


@keyframes bghueRotate {
    100% {
        filter: hue-rotate(360deg) ;
    }
  }

  </style>
  <title>JS Clock Rewind</title>
</head>
<body>
	<div class="wrapper">
	  <div class="container">
	    <div id="timeInfo">
	      <div class="dateInfo">wed 30 Oct</div>
	      <div class="time"></div>
	    </div>
	  </div>
	  <span></span>
	  <span></span>
	</div>
  <script type="text/js" defer>
    setInterval(() =>{

    const displayDate = document.querySelector(".dateInfo") ;
    const displayTime = document.querySelector(".time") ;

    let date = new Date() ;
    let hour = date.getHours() ;
    let minute = date.getMinutes() ;
    let second = date.getSeconds() ;
    let period = "AM" ;
    let weekDays = ["Sunday" , "Monday" , "Tuesday" , "Wednesday" , "Thursday" , "Friday" , "Saturday"] ;
    let monthRows = ["January" , "February" , ]


    if (hour > 12) {
        hour = hour - 12 ;
        period = "PM" ;
    }
    if (hour < 10) {
        hour = "0" + hour ;
    }
    if (minute < 10) {
        minute = "0" + minute ;
    }
    if (second < 10) {
        second = "0" + second ;
    }


    displayTime.textContent = hour + ":" + minute + ":" + second + " " + period ;

} , 1000 ) ;
  </script>
</body>
</html>
